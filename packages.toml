# Package registry consumed by scripts/resolve-packages.py.
#
# Two kinds of artifacts are tracked here:
#   [[mods]]    -> Fabric mods that run on the subservers; the resolver picks
#                  the newest MC version that ALL required mods support.
#   [[plugins]] -> Velocity proxy plugins; not constrained by MC version,
#                  the resolver simply picks the newest release per plugin.
#
# Per-entry fields:
#   name      human label, also used in resolved output
#   source    "modrinth" | "github_release"
#   project   (modrinth) project slug or id
#   repo      (github_release) "owner/name"
#   asset_re  (github_release) regex over the jar filename; must define a
#             named group `mc` for [[mods]] entries; for [[plugins]] the named
#             group is optional and ignored
#   fuzzy     (github_release, mods only) treat a tag X.Y as compatible with
#             every X.Y.* seen elsewhere
#   optional  (mods only) true => won't constrain the chosen MC; falls back
#             to the newest patch <= target

loader = "fabric"


# ============================================================
# Fabric mods (subservers)
# ============================================================

# ---------- core / required ----------

[[mods]]
name    = "fabric-api"
source  = "modrinth"
project = "fabric-api"

[[mods]]
name     = "fabric-carpet"
source   = "github_release"
repo     = "gnembon/fabric-carpet"
# literal string: no need to double-escape backslashes
asset_re = '^fabric-carpet-(?P<mc>\d+(?:\.\d+){1,2})\+v\d+\.jar$'
fuzzy    = true

[[mods]]
name    = "carpet-tis-addition"
source  = "modrinth"
project = "carpet-tis-addition"

[[mods]]
name    = "gugle-carpet-addition"
source  = "modrinth"
project = "gca"

[[mods]]
name    = "lithium"
source  = "modrinth"
project = "lithium"

[[mods]]
name    = "krypton"
source  = "modrinth"
project = "krypton"

[[mods]]
name    = "fabricproxy-lite"
source  = "modrinth"
project = "fabricproxy-lite"

[[mods]]
name    = "luckperms"
source  = "modrinth"
project = "luckperms"

[[mods]]
name    = "vanilla-permissions"
source  = "modrinth"
project = "vanilla-permissions"


# ---------- optional (won't block MC selection) ----------

[[mods]]
name     = "servux"
source   = "modrinth"
project  = "servux"
optional = true

[[mods]]
name     = "syncmatica"
source   = "modrinth"
project  = "syncmatica"
optional = true

[[mods]]
name     = "skinrestorer"
source   = "modrinth"
project  = "skinrestorer"
optional = true


# ============================================================
# MCDR plugins (installed into /data/plugins via entrypoint)
# ============================================================

[[mcdr_plugins]]
name   = "prime-backup"
source = "github_release"
repo   = "TISUnion/PrimeBackup"
asset_re = '^PrimeBackup-v[\d.]+\.pyz$'

[[mcdr_plugins]]
name   = "mirror-mcsmcdr"
source = "github_release"
repo   = "LazyAlienServer/MirrorMcsmcdR"
asset_re = '^MirrorMcsmcdR-v[\d.]+\.mcdr$'


# ============================================================
# Velocity proxy plugins
# ============================================================

# Cross-server chat bridge (also forwards to QQ via WebSocket bot).
[[plugins]]
name    = "chathub"
source  = "modrinth"
project = "chathub"

# Bedrock Edition <-> Java Edition protocol bridge.
[[plugins]]
name    = "geyser"
source  = "modrinth"
project = "geyser"

# Lets Bedrock players join without a Java account (used together with Geyser).
# Floodgate is not published to Modrinth for Velocity; pull it from the
# official GeyserMC download server.
[[plugins]]
name    = "floodgate"
source  = "geysermc"
project = "floodgate"

# Cross-version client support (newer clients on older servers, etc.).
[[plugins]]
name    = "viaversion"
source  = "modrinth"
project = "viaversion"
