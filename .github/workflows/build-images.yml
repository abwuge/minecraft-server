name: Build server images

on:
  push:
    branches: [main]
    paths:
      - 'proxy/**'
      - 'shared/**'
      - 'servers/**'
      - 'scripts/resolve-packages.py'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Build base image"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: proxy
            dockerfile: proxy/Dockerfile
          - role: survival
            dockerfile: shared/Dockerfile.server
            server_name: survival
          - role: creative
            dockerfile: shared/Dockerfile.server
            server_name: creative
    steps:
      - uses: actions/checkout@v4

      - name: Compute owner (lowercase)
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.role }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/mc-${{ matrix.role }}:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/mc-${{ matrix.role }}:sha-${{ github.sha }}
          build-args: ${{ matrix.role == 'proxy' && '' || format('BASE_IMAGE=ghcr.io/{0}/mc-base:latest
SERVER_NAME={1}', steps.owner.outputs.lc, matrix.server_name) }}
          cache-from: type=gha,scope=${{ matrix.role }}
          cache-to: type=gha,mode=max,scope=${{ matrix.role }}
