name: Build server images

on:
  push:
    branches: [main]
    paths:
      - 'proxy/**'
      - 'shared/**'
      - 'config/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Build base image"]
    types: [completed]

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  wait-for-base:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for in-progress base image builds
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxWait = 600;
            const interval = 15;
            let elapsed = 0;
            while (elapsed < maxWait) {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: 'base-image.yml',
                status: 'in_progress',
              });
              if (runs.total_count === 0) {
                const { data: queued } = await github.rest.actions.listWorkflowRuns({
                  owner, repo,
                  workflow_id: 'base-image.yml',
                  status: 'queued',
                });
                if (queued.total_count === 0) break;
              }
              core.info(`Base image build in progress, waiting... (${elapsed}s)`);
              await new Promise(r => setTimeout(r, interval * 1000));
              elapsed += interval;
            }
            if (elapsed >= maxWait) {
              core.setFailed('Timed out waiting for base image build');
            }
            // If triggered by workflow_run, check that it succeeded
            if (context.eventName === 'workflow_run' && context.payload.workflow_run?.conclusion !== 'success') {
              core.setFailed(`Base image build ${context.payload.workflow_run?.conclusion}, skipping`);
            }

  build:
    needs: wait-for-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: proxy
            dockerfile: proxy/Dockerfile
          - role: main
            dockerfile: shared/Dockerfile.server
            server_name: main
          - role: mirror
            dockerfile: shared/Dockerfile.server
            server_name: mirror
          - role: create
            dockerfile: shared/Dockerfile.server
            server_name: create
    steps:
      - uses: actions/checkout@v4

      - name: Compute owner (lowercase)
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.role }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/mc-${{ matrix.role }}:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/mc-${{ matrix.role }}:sha-${{ github.sha }}
          build-args: |
            ${{ matrix.role == 'proxy' && '' || format('BASE_IMAGE=ghcr.io/{0}/mc-base:latest', steps.owner.outputs.lc) }}
            ${{ matrix.role == 'proxy' && '' || format('SERVER_NAME={0}', matrix.server_name) }}
          cache-from: type=gha,scope=${{ matrix.role }}
          cache-to: type=gha,mode=max,scope=${{ matrix.role }}
