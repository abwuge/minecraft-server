name: Build base image

# The base image self-resolves MC + Fabric + mod versions at build time
# from mods.toml, so this workflow has no version inputs.
on:
  push:
    branches: [main]
    paths:
      - 'base/**'
      - 'mods.toml'
      - 'scripts/resolve-mods.py'
      - '.github/workflows/base-image.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'  # weekly refresh to pick up new mod / MC versions

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/mc-base" >> $GITHUB_OUTPUT

      - name: Build & push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
