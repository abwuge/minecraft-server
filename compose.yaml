name: mcnet

x-common-env: &common-env
  VELOCITY_FORWARDING_SECRET: ${VELOCITY_FORWARDING_SECRET}
  RCON_PASSWORD: ${RCON_PASSWORD}

services:
  proxy:
    image: ${IMAGE_PROXY:-ghcr.io/${GHCR_OWNER:-abwuge}/mc-proxy:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: proxy/Dockerfile
    container_name: mcnet-proxy
    restart: unless-stopped
    environment:
      <<: *common-env
      XMS: 512M
      XMX: 1G
      MOTD_PROXY: ${MOTD_PROXY}
    ports:
      - "${PROXY_PORT:-25565}:25565/tcp"
      - "${BEDROCK_PORT:-19132}:19132/udp"
    volumes:
      - ./data/proxy:/data
    networks: [mcnet]
    depends_on:
      main:
        condition: service_healthy
      mirror:
        condition: service_healthy
      create:
        condition: service_healthy

  main:
    image: ${IMAGE_MAIN:-ghcr.io/${GHCR_OWNER:-abwuge}/mc-main:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: shared/Dockerfile.server
      args:
        BASE_IMAGE: ghcr.io/${GHCR_OWNER:-abwuge}/mc-base:latest
        SERVER_NAME: main
    container_name: mcnet-main
    restart: unless-stopped
    environment:
      <<: *common-env
      XMS: ${MAIN_XMS:-2G}
      XMX: ${MAIN_XMX:-6G}
      MOTD_SERVER: "§amain §7- 主生电世界"
    volumes:
      - ./data/main:/data
    networks: [mcnet]
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/25565' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30

  mirror:
    image: ${IMAGE_MIRROR:-ghcr.io/${GHCR_OWNER:-abwuge}/mc-mirror:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: shared/Dockerfile.server
      args:
        BASE_IMAGE: ghcr.io/${GHCR_OWNER:-abwuge}/mc-base:latest
        SERVER_NAME: mirror
    container_name: mcnet-mirror
    restart: unless-stopped
    environment:
      <<: *common-env
      XMS: ${MIRROR_XMS:-1G}
      XMX: ${MIRROR_XMX:-3G}
      MOTD_SERVER: "§emirror §7- 镜像服"
    volumes:
      - ./data/mirror:/data
    networks: [mcnet]
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/25565' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30

  create:
    image: ${IMAGE_CREATE:-ghcr.io/${GHCR_OWNER:-abwuge}/mc-create:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: shared/Dockerfile.server
      args:
        BASE_IMAGE: ghcr.io/${GHCR_OWNER:-abwuge}/mc-base:latest
        SERVER_NAME: create
    container_name: mcnet-create
    restart: unless-stopped
    environment:
      <<: *common-env
      XMS: ${CREATE_XMS:-1G}
      XMX: ${CREATE_XMX:-3G}
      MOTD_SERVER: "§dcreate §7- 超平坦试验场"
    volumes:
      - ./data/create:/data
    networks: [mcnet]
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/25565' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30

  mcsm-web:
    image: ghcr.io/mcsmanager/mcsmanager-web:latest
    container_name: mcnet-mcsm-web
    restart: unless-stopped
    ports:
      - "${MCSM_WEB_PORT:-23333}:23333"
    volumes:
      - ./data/mcsm/web/data:/opt/mcsmanager/web/data
      - ./data/mcsm/web/logs:/opt/mcsmanager/web/logs
    networks: [mcnet]
    depends_on:
      - mcsm-daemon

  mcsm-daemon:
    image: ghcr.io/mcsmanager/mcsmanager-daemon:latest
    container_name: mcnet-mcsm-daemon
    restart: unless-stopped
    ports:
      - "${MCSM_DAEMON_PORT:-24444}:24444"
    volumes:
      - ./data/mcsm/daemon/data:/opt/mcsmanager/daemon/data
      - ./data/mcsm/daemon/logs:/opt/mcsmanager/daemon/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [mcnet]

  gateway:
    image: caddy:2-alpine
    container_name: mcnet-gateway
    restart: unless-stopped
    profiles: [gateway]
    ports:
      - "${GATEWAY_PORT:-1080}:80"
    volumes:
      - ./config/gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/gateway/data:/data
      - ./data/gateway/config:/config
    networks: [mcnet]
    depends_on:
      - mcsm-web

networks:
  mcnet:
    driver: bridge
