name: mcnet

x-common-env: &common-env
  VELOCITY_FORWARDING_SECRET: ${VELOCITY_FORWARDING_SECRET}
  RCON_PASSWORD: ${RCON_PASSWORD}

services:
  proxy:
    image: ${IMAGE_PROXY:-ghcr.io/${GHCR_OWNER:-abwuge}/mc-proxy:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: proxy/Dockerfile
    container_name: mcnet-proxy
    restart: unless-stopped
    environment:
      <<: *common-env
      XMS: 512M
      XMX: 1G
      MOTD_PROXY: ${MOTD_PROXY}
    ports:
      - "${PROXY_PORT:-25565}:25565/tcp"
      - "${BEDROCK_PORT:-19132}:19132/udp"
    volumes:
      - ./data/proxy:/data
    networks: [mcnet]
    depends_on:
      survival:
        condition: service_healthy
      creative:
        condition: service_healthy

  survival:
    image: ${IMAGE_SURVIVAL:-ghcr.io/${GHCR_OWNER:-abwuge}/mc-survival:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: shared/Dockerfile.server
      args:
        BASE_IMAGE: ghcr.io/${GHCR_OWNER:-abwuge}/mc-base:latest
        SERVER_NAME: survival
    container_name: mcnet-survival
    restart: unless-stopped
    environment:
      <<: *common-env
      XMS: ${SURVIVAL_XMS:-2G}
      XMX: ${SURVIVAL_XMX:-6G}
      MOTD_SERVER: "§asurvival §7- 主生电世界"
    volumes:
      - ./data/survival:/data
    networks: [mcnet]
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/25565' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30

  creative:
    image: ${IMAGE_CREATIVE:-ghcr.io/${GHCR_OWNER:-abwuge}/mc-creative:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: shared/Dockerfile.server
      args:
        BASE_IMAGE: ghcr.io/${GHCR_OWNER:-abwuge}/mc-base:latest
        SERVER_NAME: creative
    container_name: mcnet-creative
    restart: unless-stopped
    environment:
      <<: *common-env
      XMS: ${CREATIVE_XMS:-1G}
      XMX: ${CREATIVE_XMX:-3G}
      MOTD_SERVER: "§dcreative §7- 超平坦试验场"
    volumes:
      - ./data/creative:/data
    networks: [mcnet]
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/25565' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30

  mcsm-web:
    image: githubyumao/mcsmanager-web:latest
    container_name: mcnet-mcsm-web
    restart: unless-stopped
    ports:
      - "${MCSM_WEB_PORT:-23333}:23333"
    volumes:
      - ./data/mcsm/web/data:/opt/mcsmanager/web/data
      - ./data/mcsm/web/logs:/opt/mcsmanager/web/logs
    networks: [mcnet]
    depends_on:
      - mcsm-daemon

  mcsm-daemon:
    image: githubyumao/mcsmanager-daemon:latest
    container_name: mcnet-mcsm-daemon
    restart: unless-stopped
    ports:
      - "${MCSM_DAEMON_PORT:-24444}:24444"
    volumes:
      - ./data/mcsm/daemon/data:/opt/mcsmanager/daemon/data
      - ./data/mcsm/daemon/logs:/opt/mcsmanager/daemon/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [mcnet]

networks:
  mcnet:
    driver: bridge

